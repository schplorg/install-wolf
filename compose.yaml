services:

  wolf1:
    image: ghcr.io/games-on-whales/wolf:stable
    container_name: wolf1
    privileged: true
    restart: unless-stopped

    environment:
      - DOCKER_HOST=unix:///run/user/1000/podman/podman.sock

    ports:
      - "48001:48010"
      - "47989:47989"

    volumes:
      - ./wolf1:/etc/wolf
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
      - /dev/uhid:/dev/uhid

